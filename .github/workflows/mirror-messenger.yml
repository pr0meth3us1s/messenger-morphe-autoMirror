name: Mirror Messenger APK

on:
  workflow_dispatch:
  schedule:
    - cron: "30 */6 * * *"

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch latest upstream release JSON
        run: |
          curl -fsSL "https://api.github.com/repos/RookieEnough/Morphe-AutoBuilds/releases/latest" -o release.json

      - name: Pick Messenger APK
        id: pick
        run: |
          ASSET_URL=$(jq -r '
            .assets[]
            | select(.name | test("messenger"; "i"))
            | select(.name | test("\\.apk$"; "i"))
            | .browser_download_url
          ' release.json | head -n 1)

          ASSET_NAME=$(jq -r '
            .assets[]
            | select(.name | test("messenger"; "i"))
            | select(.name | test("\\.apk$"; "i"))
            | .name
          ' release.json | head -n 1)

          UPSTREAM_TAG=$(jq -r '.tag_name' release.json)
          UPSTREAM_NAME=$(jq -r '.name' release.json)

          test -n "$ASSET_URL"
          test "$ASSET_URL" != "null"

          echo "asset_url=$ASSET_URL" >> "$GITHUB_OUTPUT"
          echo "asset_name=$ASSET_NAME" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"
          echo "upstream_name=$UPSTREAM_NAME" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          curl -fL "${{ steps.pick.outputs.asset_url }}" -o messenger-morphe.apk

      - name: Delete old latest release if it exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view latest -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 && \
          gh release delete latest -R "$GITHUB_REPOSITORY" --yes || true

          gh api -X DELETE \
            "repos/$GITHUB_REPOSITORY/git/refs/tags/latest" \
            >/dev/null 2>&1 || true

      - name: Create fresh latest release with only Messenger APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest messenger-morphe.apk \
            -R "$GITHUB_REPOSITORY" \
            --title "Messenger Mirror" \
            --notes "Mirrored from RookieEnough/Morphe-AutoBuilds

          Upstream release: ${{ steps.pick.outputs.upstream_name }}
          Upstream tag: ${{ steps.pick.outputs.upstream_tag }}
          Original asset: ${{ steps.pick.outputs.asset_name }}"
